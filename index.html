        <!-- an app -->

        <div id="calculator" class="window">
            <p id="calculatorheader" class="handle">
                <svg style="height:40px; width:50px;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 18L20 18" stroke="#000000" stroke-width="2" stroke-linecap="round"></path> <path d="M4 12L20 12" stroke="#000000" stroke-width="2" stroke-linecap="round"></path> <path d="M4 6L20 6" stroke="#000000" stroke-width="2" stroke-linecap="round"></path> </g></svg>

                </p>
            <h1 class="nativeintrotitle" style="margin-top:-50px;"><b>calculator</b></h1>
            <input type="text" class="calcdisplay" id="calcdisplay" readonly>
            <div class="calcgrid">
                <button class="calcbutton" id="calc1">1</button>
                <button class="calcbutton" id="calc2">2</button>
                <button class="calcbutton" id="calc3">3</button>
                <button class="calcbutton" id="calcplus">+</button>
                <button class="calcbutton" id="calc4">4</button>
                <button class="calcbutton" id="calc5">5</button>
                <button class="calcbutton" id="calc6">6</button>
                <button class="calcbutton" id="calcminus">-</button>
                <button class="calcbutton" id="calc7">7</button>
                <button class="calcbutton" id="calc8">8</button>
                <button class="calcbutton" id="calc9">9</button>
                <button class="calcbutton" id="calcmultiply">*</button>
                <button class="calcbutton" id="calc0">0</button>
                <button class="calcbutton" id="calcequals">=</button>
                <button class="calcbutton" id="calcdivide">/</button>
                <button class="calcbutton" id="calcclear">C</button>
            </div>
            </div>

        <div id="browser" class="windowbig">
            <div id="browserheader" class="handle browserhandle">
                <svg style="height:40px; width:50px; flex:0 0 auto;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 18L20 18" stroke="#000000" stroke-width="2" stroke-linecap="round"></path> <path d="M4 12L20 12" stroke="#000000" stroke-width="2" stroke-linecap="round"></path> <path d="M4 6L20 6" stroke="#000000" stroke-width="2" stroke-linecap="round"></path> </g></svg>
                <button class="browserbtn" id="browserback" title="Back"><svg viewBox="0 -960 960 960" height="22" width="22" fill="#001427"><path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/></svg></button>
                <button class="browserbtn" id="browserforward" title="Forward"><svg viewBox="0 -960 960 960" height="22" width="22" fill="#001427"><path d="m321-80-71-71 329-329-329-329 71-71 400 400L321-80Z"/></svg></button>
                <button class="browserbtn" id="browserhome" title="Home"><svg viewBox="0 -960 960 960" height="22" width="22" fill="#001427"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Z"/></svg></button>

            </div>
            <iframe id="browseriframe" class="browseriframe" src="./start.html"></iframe>
            </div>

            </div>

            <div id="spotifybody" class="spotifybody">
                <!-- Logged-out view -->
                <div id="spotifylogin" class="spotifylogin">
                    <p class="spotifyprompt">See what you're listening to</p>
                    <input type="text" id="spotifyclientid" class="spotifyclientinput" placeholder="Your Spotify Client ID">
                    <button id="spotifyconnect" class="spotifyconnectbtn">Connect Spotify</button>
                    <p id="spotifyredirect" class="spotifyredirectnote"></p>
                    <p id="spotifyconfignote" class="spotifyconfignote"></p>
                    <a class="spotifyhelplink" href="https://developer.spotify.com/dashboard" target="_blank">Create an app to get a Client ID →</a>
                </div>

                <!-- Logged-in / now-playing view -->
                <div id="spotifyplaying" class="spotifyplaying" style="display:none;">
                    <img id="spotifyart" class="spotifyart" alt="album art">
                    <p id="spotifytrack" class="spotifytrackname">Nothing playing</p>
                    <p id="spotifyartist" class="spotifyartistname"></p>
                    <p id="spotifystatus" class="spotifystatustext"></p>
                    <button id="spotifylogout" class="spotifylogoutbtn">Disconnect</button>
                </div>
            </div>
        </div>
