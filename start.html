<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@100;300;400;900&display=swap">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: 'Londrina Solid', cursive;
            background: linear-gradient(160deg, #dbecff 0%, #f9f9f9 100%);
            color: #001427;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        h1 {
            font-size: 64px;
            color: #167cdb;
            margin: 0;
        }
        form {
            display: flex;
            gap: 8px;
        }
        #q {
            width: 460px;
            height: 44px;
            font-size: 20px;
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 22px;
            outline: none;
            font-family: inherit;
        }
        button {
            height: 58px;
            padding: 0 24px;
            font-size: 22px;
            font-family: inherit;
            font-weight: bold;
            color: white;
            background: #167cdb;
            border: none;
            border-radius: 22px;
            cursor: pointer;
        }
        button:hover { background: #0f5ca8; }
        .links {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 720px;
        }
        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 70px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            color: #001427;
            text-decoration: none;
            font-size: 22px;
            transition: transform 0.15s ease;
        }
        .links a:hover { transform: translateY(-4px); }
        .note {
            font-size: 16px;
            color: #5a6b7b;
            max-width: 520px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <h1>Browser</h1>

    <!-- Search engines block iframe embedding, so results open in a real tab. -->
    <form onsubmit="window.open('https://www.google.com/search?q=' + encodeURIComponent(document.getElementById('q').value), '_blank'); return false;">
        <input type="text" id="q" placeholder="Search the web...">
        <button type="submit">Search</button>
    </form>

    <!-- These sites allow embedding, so they load inside the browser window. -->
    <div class="links">
        <a href="https://en.wikipedia.org/wiki/Special:Random">Wikipedia</a>
        <a href="https://www.openstreetmap.org">Maps</a>
        <a href="https://native.beer">native.beer</a>
        <a href="https://github.com">github.com</a>
    </div>

    <p class="note">Type a site like <b>wikipedia.org</b> in the address bar to visit it in-window. Web searches open in a new tab, because search engines refuse to load inside another page.</p>
</body>
</html>
